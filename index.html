<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  body { font-family:sans-serif; margin:8px; }
  svg#svg { border:1px solid #ccc; background:#fafafa; cursor:grab; vertical-align:top; display:block; touch-action:none; }
  svg#svg.measuring { cursor:crosshair; }
  svg#svg.panning { cursor:grabbing; }
  text { font-size:12px; }
  .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:4px; flex-wrap:wrap; padding:6px 10px; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; font-size:12px; }
  .toolbar label { cursor:pointer; user-select:none; color:#333; }
  .toolbar .sep { width:1px; height:18px; background:#ccc; }
  .toolbar button { font-size:11px; padding:2px 8px; border:1px solid #999; border-radius:3px; background:#fff; cursor:pointer; }
  .toolbar button:hover { background:#eee; }
  .toolbar button.active { background:#d44; color:#fff; border-color:#d44; }
  .mstat { font-size:11px; color:#666; font-family:monospace; }
  .production-hint { font-size:11px; color:#666; }
  .tabs { display:flex; gap:0; margin-bottom:6px; flex-wrap:wrap; }
  .tab { padding:4px 12px; font-size:11px; border:1px solid #ccc; border-bottom:none; background:#e8e8e8; cursor:pointer; user-select:none; border-radius:4px 4px 0 0; margin-right:-1px; color:#555; }
  .tab:hover { background:#ddd; }
  .tab.active { background:#fafafa; color:#000; font-weight:bold; border-bottom:1px solid #fafafa; position:relative; z-index:1; }
  .tab .dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }
  .main-area { display:inline-block; position:relative; vertical-align:top; }
  .cutlist { position:absolute; z-index:5; border:1px solid #bbb; border-radius:4px; background:rgba(255,255,255,0.94); font-size:10px; width:245px; max-height:210px; overflow:auto; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
  .cutlist.hidden { display:none; }
  .cutlist.collapsed { width:160px; max-height:none; overflow:hidden; }
  .cutlist.collapsed table { display:none; }
  .cutlist h4 { margin:0; padding:5px 8px; background:#f0f0f0; border-bottom:1px solid #ccc; font-size:11px; cursor:pointer; user-select:none; }
  .cutlist table { width:100%; border-collapse:collapse; }
  .cutlist th { text-align:left; padding:2px 5px; background:#f8f8f8; border-bottom:1px solid #ddd; font-size:9px; color:#666; text-transform:uppercase; }
  .cutlist td { padding:2px 5px; border-bottom:1px solid #f0f0f0; font-family:monospace; font-size:10px; }
  .cutlist tr:hover { background:#f5f5ff; }
  .settings-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.3); z-index:100; }
  .settings-overlay.open { display:flex; justify-content:center; align-items:flex-start; padding-top:30px; }
  .settings-panel { background:#fff; border:1px solid #ccc; border-radius:6px; padding:16px 20px; width:440px; box-shadow:0 4px 20px rgba(0,0,0,0.15); max-height:85vh; overflow-y:auto; }
  .settings-panel h3 { margin:0 0 10px; font-size:14px; color:#333; }
  .settings-panel .row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
  .settings-panel .row label { font-size:11px; color:#555; width:120px; flex-shrink:0; }
  .settings-panel .row input[type=color] { width:28px; height:20px; border:1px solid #ccc; padding:0; cursor:pointer; }
  .settings-panel .row input[type=range] { flex:1; }
  .settings-panel .row input[type=number] { width:50px; font-size:11px; padding:1px 3px; border:1px solid #ccc; border-radius:2px; }
  .settings-panel .row select { font-size:11px; padding:1px 3px; border:1px solid #ccc; border-radius:2px; }
  .settings-panel .row .val { font-size:10px; color:#888; font-family:monospace; width:36px; text-align:right; }
  .settings-panel .section { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.5px; margin:10px 0 4px; border-top:1px solid #eee; padding-top:6px; font-weight:bold; }
  .settings-panel button { margin-top:8px; padding:4px 14px; font-size:11px; border:1px solid #ccc; border-radius:3px; background:#f5f5f5; cursor:pointer; }
  .settings-panel button:hover { background:#eee; }
  .settings-panel .sub-section { font-size:10px; color:#bbb; margin:6px 0 3px; font-style:italic; }

  /* File sidebar */
  .sidebar-toggle { position:fixed; left:0; top:50%; transform:translateY(-50%); z-index:50; background:#f0f0f0; border:1px solid #ccc; border-left:none; border-radius:0 4px 4px 0; padding:8px 4px; cursor:pointer; font-size:10px; writing-mode:vertical-rl; }
  .sidebar-toggle:hover { background:#e0e0e0; }
  .sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:#fff; border-right:1px solid #ccc; z-index:50; transform:translateX(-220px); transition:transform 0.2s; overflow-y:auto; padding:8px; font-size:11px; }
  .sidebar.open { transform:translateX(0); }
  .sidebar h4 { margin:0 0 6px; font-size:12px; }
  .sidebar .upload-area { border:2px dashed #ccc; border-radius:4px; padding:12px; text-align:center; color:#999; cursor:pointer; margin-bottom:8px; font-size:11px; }
  .sidebar .upload-area:hover { border-color:#999; color:#666; }
  .sidebar .upload-area input { display:none; }
  .sidebar .file-list { list-style:none; padding:0; margin:0; }
  .sidebar .file-item { padding:4px 6px; border:1px solid #eee; border-radius:3px; margin-bottom:4px; cursor:pointer; display:flex; flex-direction:column; gap:2px; }
  .sidebar .file-item:hover { background:#f0f5ff; border-color:#aac; }
  .sidebar .file-item.active { background:#e8f0ff; border-color:#68a; }
  .sidebar .file-item .fname { font-weight:bold; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sidebar .file-item .finfo { font-size:9px; color:#888; }
  .sidebar .file-item svg { display:block; width:100%; height:60px; border:1px solid #eee; border-radius:2px; background:#fafafa; margin-top:2px; }
  .sidebar .close-btn { position:absolute; top:4px; right:6px; cursor:pointer; font-size:14px; color:#999; }
  .sidebar .close-btn:hover { color:#333; }
  body.sidebar-open { margin-left:228px; }
  .production-board { position:fixed; right:0; top:0; bottom:0; width:320px; background:#fff; border-left:1px solid #bbb; z-index:45; transform:translateX(320px); transition:transform 0.2s; display:flex; flex-direction:column; font-size:11px; }
  .production-board.open { transform:translateX(0); }
  body.production-open { margin-right:328px; }
  .production-head { display:flex; align-items:flex-start; gap:8px; justify-content:space-between; padding:8px 10px; background:#f6f6f6; border-bottom:1px solid #ccc; }
  .production-head h3 { margin:0; font-size:14px; }
  .production-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .production-actions button { font-size:11px; padding:3px 8px; border:1px solid #aaa; border-radius:3px; background:#fff; cursor:pointer; }
  .production-actions button:hover { background:#eee; }
  .production-actions button.active { background:#333; color:#fff; border-color:#333; }
  .production-summary { font-size:11px; color:#555; font-family:monospace; }
  .sub-grid { padding:8px; display:flex; flex-direction:column; gap:7px; overflow:auto; flex:1; }
  .sub-card { border:1px solid #ccc; border-radius:4px; background:#fff; padding:5px 6px; display:grid; grid-template-columns:22px 42px minmax(0,1fr); gap:6px; cursor:pointer; align-items:center; }
  .sub-card:hover { border-color:#777; background:#fbfdff; }
  .sub-card.built { background:#eee; border-color:#bbb; color:#777; opacity:0.72; }
  .sub-card.active { outline:2px solid #4477aa; outline-offset:-2px; }
  .sub-card.issue { background:#fff6ed; border-color:#d7a76b; }
  .sub-card input[type=checkbox] { width:17px; height:17px; margin-top:1px; cursor:pointer; }
  .sub-card h4 { margin:0; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sub-card .meta { font-size:10px; color:#666; display:flex; gap:5px; flex-wrap:wrap; margin-top:1px; align-items:center; }
  .sub-card .notes { font-size:10px; color:#555; margin-top:2px; min-height:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sub-card svg { display:block; width:40px; height:32px; border:1px solid #eee; background:#fafafa; border-radius:2px; }
  .status-pill { display:inline-block; padding:1px 5px; border:1px solid #bbb; border-radius:10px; background:#f5f5f5; font-size:9px; text-transform:uppercase; }
  .built .status-pill { border-color:#aaa; background:#ddd; color:#555; }
  .issue .status-pill { border-color:#c89151; background:#fff1df; color:#7a4b14; }
  .production-side { border-top:1px solid #ccc; background:#fafafa; padding:8px; max-height:210px; overflow:auto; }
  .production-side h4 { margin:0 0 6px; font-size:12px; }
  .production-side textarea { width:100%; min-height:72px; resize:vertical; font-size:10px; font-family:monospace; box-sizing:border-box; border:1px solid #bbb; border-radius:3px; padding:6px; }
  .build-log { list-style:none; margin:8px 0 0; padding:0; font-size:10px; }
  .build-log li { padding:5px 0; border-bottom:1px solid #e4e4e4; }
  .build-log .time { color:#777; font-family:monospace; display:block; }
  .empty-board { padding:30px; color:#777; font-size:13px; }
  .current-build { display:none; align-items:center; gap:8px; margin-bottom:6px; padding:7px 9px; background:#eef5ff; border:1px solid #b8cde8; border-radius:4px; font-size:12px; }
  .current-build.open { display:flex; }
  .current-build input { width:18px; height:18px; }
  .current-build strong { display:block; }
  .current-build span { color:#555; font-size:10px; }
  #v1bar { display:flex; gap:6px; align-items:center; margin-bottom:6px; padding:6px 10px; background:#eef5ff; border:1px solid #b8cde8; border-radius:4px; font-size:12px; }
  #v1bar strong { font-size:12px; }
  #v1bar input { font-family:monospace; font-size:11px; padding:3px 6px; border:1px solid #aac; border-radius:3px; }
  #v1bar button { font-size:11px; padding:3px 10px; border:1px solid #68a; border-radius:3px; background:#fff; cursor:pointer; }
  #v1bar #scanBtn { background:#4477aa; color:#fff; border-color:#4477aa; font-weight:bold; }
  #scanOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; justify-content:center; align-items:center; }
  #scanOverlay.open { display:flex; }
  .scan-box { background:#111; color:#fff; border-radius:10px; padding:12px; width:min(94vw,460px); display:flex; flex-direction:column; gap:8px; }
  .scan-head { display:flex; justify-content:space-between; align-items:center; font-size:15px; }
  .scan-head button { background:#333; color:#fff; border:none; border-radius:4px; width:28px; height:28px; font-size:16px; cursor:pointer; }
  #scanVideo { width:100%; border-radius:8px; background:#000; aspect-ratio:1/1; object-fit:cover; }
  .scan-status { font-size:12px; color:#9bd; font-family:monospace; min-height:16px; }
  .scan-manual { display:flex; gap:6px; }
  .scan-manual input { flex:1; font-family:monospace; font-size:12px; padding:6px; border-radius:4px; border:1px solid #555; background:#222; color:#fff; }
  .scan-manual button { padding:6px 12px; border-radius:4px; border:none; background:#4477aa; color:#fff; cursor:pointer; }
</style>
<script src="qr-codec.js"></script>
<script src="vendor/jsQR.min.js"></script>
<style>
  :root{--bg:#f4f6f8;--panel:#fff;--ink:#1c2733;--muted:#6b7885;--line:#e2e8ee;--accent:#2f6feb;--accent-d:#255bd0;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;overflow:hidden;}
  .sidebar,.sidebar-toggle,.production-board,.tabs,.current-build,#v1bar,.toolbar{display:none!important;}
  #appbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.05);z-index:20;flex:0 0 auto;}
  #appbar .brand{display:flex;align-items:center;gap:9px;min-width:0;}
  #appbar .logo{width:28px;height:28px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 auto;}
  #appbar .ttl{display:flex;flex-direction:column;min-width:0;}
  #appbar .ttl strong{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #appbar .tools{margin-left:auto;display:flex;align-items:center;gap:6px;}
  #appbar .mstat{font-size:11px;color:var(--muted);font-family:ui-monospace,monospace;margin-right:4px;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tbtn{height:34px;min-width:34px;padding:0 10px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
  .tbtn:hover{background:#eef2f7;}
  .tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .tbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-size:14px;font-weight:600;padding:0 14px;}
  .tbtn.primary:hover{background:var(--accent-d);}
  #stage{position:relative;flex:1 1 auto;overflow:hidden;background:radial-gradient(circle at 1px 1px,#dbe2ea 1px,transparent 0) 0 0/22px 22px,var(--bg);}
  svg#svg{position:absolute;inset:0;width:100%;height:100%;background:transparent;border:none;touch-action:none;display:block;cursor:grab;}
  svg#svg.measuring{cursor:crosshair;}
  svg#svg.panning{cursor:grabbing;}
  .cutlist{position:absolute;right:12px;bottom:12px;z-index:5;width:250px;max-height:46vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);font-size:12px;resize:both;}
  .cutlist.hidden{display:none;}
  .cutlist.collapsed{max-height:none;overflow:hidden;resize:none;width:auto;}
  .cutlist.collapsed table{display:none;}
  .cutlist h4{margin:0;padding:8px 11px;background:#f7f9fb;border-bottom:1px solid var(--line);border-radius:10px 10px 0 0;font-size:12px;font-weight:600;cursor:grab;user-select:none;position:sticky;top:0;}
  .cutlist table{width:100%;border-collapse:collapse;}
  .cutlist th{position:sticky;top:33px;text-align:left;padding:4px 9px;background:#fbfcfd;border-bottom:1px solid var(--line);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .cutlist td{padding:4px 9px;border-bottom:1px solid #f0f3f6;font-family:ui-monospace,monospace;font-size:11px;}
  .cutlist tr:hover{background:#f2f7ff;}
  .settings-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,35,.35);z-index:100;}
  .settings-overlay.open{display:block;}
  .settings-panel{position:absolute;top:0;right:0;bottom:0;width:min(92vw,380px);background:var(--panel);box-shadow:-8px 0 30px rgba(0,0,0,.18);padding:16px 18px 48px;overflow-y:auto;border:none;border-radius:0;max-height:none;animation:qslide .18s ease;}
  @keyframes qslide{from{transform:translateX(24px);opacity:.5;}to{transform:none;opacity:1;}}
  .settings-panel h3{margin:0 0 12px;font-size:16px;font-weight:600;color:var(--ink);}
  .settings-panel .section{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;border-top:1px solid var(--line);padding-top:10px;font-weight:600;}
  .settings-panel .sub-section{font-size:11px;color:#9aa7b3;margin:8px 0 4px;font-style:normal;font-weight:600;}
  .settings-panel .toggles{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;}
  .settings-panel .toggles label{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink);padding:4px 0;cursor:pointer;width:auto;}
  .settings-panel .toggles input{width:16px;height:16px;flex:0 0 auto;}
  .settings-panel .row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .settings-panel .row label{font-size:12px;color:var(--muted);width:118px;flex:0 0 auto;}
  .settings-panel .row input[type=color]{width:30px;height:22px;border:1px solid var(--line);padding:0;border-radius:4px;cursor:pointer;}
  .settings-panel .row input[type=range]{flex:1;}
  .settings-panel .row input[type=number]{width:56px;font-size:12px;padding:2px 4px;border:1px solid var(--line);border-radius:5px;}
  .settings-panel .row select{font-size:12px;padding:2px 4px;border:1px solid var(--line);border-radius:5px;flex:1;}
  .settings-panel .row .val{font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;width:40px;text-align:right;}
  .settings-panel button{margin-top:10px;padding:8px 14px;font-size:13px;border:1px solid var(--line);border-radius:8px;background:#f7f9fb;cursor:pointer;}
  .settings-panel button:hover{background:#eef2f7;}
  #btnSettingsClose{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;}
  #scanOverlay{display:none;position:fixed;inset:0;background:rgba(10,16,22,.9);z-index:200;justify-content:center;align-items:center;}
  #scanOverlay.open{display:flex;}
  .scan-box{background:#141a20;color:#fff;border-radius:14px;padding:16px;width:min(94vw,440px);display:flex;flex-direction:column;gap:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .scan-head{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:600;}
  .scan-head button{background:#2a333c;color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:16px;cursor:pointer;}
  #scanVideo{width:100%;border-radius:10px;background:#000;aspect-ratio:1/1;object-fit:cover;}
  .scan-status{font-size:12px;color:#8fb6e6;font-family:ui-monospace,monospace;min-height:16px;text-align:center;}
  .scan-manual{display:flex;gap:8px;}
  .scan-manual input{flex:1;font-family:ui-monospace,monospace;font-size:12px;padding:9px;border-radius:8px;border:1px solid #333;background:#0e1318;color:#fff;}
  .scan-manual button{padding:9px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;}
  @media (max-width:640px){ .cutlist{width:188px;right:8px;bottom:8px;max-height:42vh;} #appbar .mstat{display:none;} #appbar .ttl strong{max-width:34vw;} .tbtn{padding:0 8px;} }
</style>
</head>
<body>

<header id="appbar">
  <div class="brand">
    <span class="logo">▤</span>
    <div class="ttl"><strong id="v1sub">Demo</strong></div>
  </div>
  <div class="tools">
    <span id="mStatus" class="mstat"></span>
    <button id="btnMeasure" class="tbtn" title="Measure tool">📏</button>
    <button id="btnClear" class="tbtn" title="Clear measurements">✕</button>
    <button id="btnZoomReset" class="tbtn" title="Fit / reset zoom">⤢</button>
    <button id="btnSettings" class="tbtn" title="Settings">⚙</button>
    <button id="scanBtn" class="tbtn primary" title="Scan a sub QR">📷 Scan</button>
  </div>
</header>
<main id="stage">
  <svg id="svg"></svg>
  <div class="cutlist" id="cutlist"></div>
</main>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay">
<div class="settings-panel">
  <h3>⚙ Display Settings</h3>

  <div class="section">Views</div>
  <div class="toggles">
    <label><input type="checkbox" id="chkFront" checked> Front</label>
    <label><input type="checkbox" id="chkBackView"> Back view</label>
    <label><input type="checkbox" id="chkTop" checked> Top</label>
    <label><input type="checkbox" id="chkBottom" checked> Bottom</label>
    <label><input type="checkbox" id="chkSide" checked> Side</label>
    <label><input type="checkbox" id="chkHideKing" checked> Hide king (side)</label>
  </div>
  <div class="section">Dimensions &amp; labels</div>
  <div class="toggles">
    <label><input type="checkbox" id="chkDims" checked> Overall dims</label>
    <label><input type="checkbox" id="chkStudDims"> Stud chain</label>
    <label><input type="checkbox" id="chkOpenDims" checked> Opening dims</label>
    <label><input type="checkbox" id="chkOriginDims" checked> Origin dims</label>
    <label><input type="checkbox" id="chkOriginR"> Origin from right</label>
    <label><input type="checkbox" id="chkSpecs"> Header/sill specs</label>
    <label><input type="checkbox" id="chkCutEnds" checked> Cut-end marks</label>
    <label><input type="checkbox" id="chkSheetSide" checked> Sheet-side mark</label>
  </div>
  <div class="section">Other</div>
  <div class="toggles">
    <label><input type="checkbox" id="chkRouting" checked> Routing outline</label>
    <label><input type="checkbox" id="chkNails"> Nails</label>
    <label><input type="checkbox" id="chkSheets"> Sheets</label>
    <label><input type="checkbox" id="chkCutList" checked> Cut list</label>
  </div>

  <div class="section">Element Colours</div>
  <div class="row"><label>Stud</label><input type="color" id="cStud" value="#c8a26e"><span class="val"></span></div>
  <div class="row"><label>Plate</label><input type="color" id="cPlate" value="#a07840"><span class="val"></span></div>
  <div class="row"><label>Header</label><input type="color" id="cHeader" value="#d4a44a"><span class="val"></span></div>
  <div class="row"><label>Sill</label><input type="color" id="cSill" value="#bfa060"><span class="val"></span></div>
  <div class="row"><label>Sheet</label><input type="color" id="cSheet" value="#7a9a6a"><span class="val"></span></div>
  <div class="row"><label>Opening</label><input type="color" id="cOpening" value="#cc3333"><span class="val"></span></div>

  <div class="section">Sub Assembly Colours</div>

const DEFAULTS={cStud:'#c8a26e',cPlate:'#a07840',cHeader:'#d4a44a',cSill:'#bfa060',cSheet:'#7a9a6a',cOpening:'#cc3333',cDim:'#0066cc',cMeasure:'#dd4444',dimFont:9,dimTick:3,dimLine:5,dimExt:'2,2',chainOff1:16,chainOff2:28,overallOff:42,scale:12,subColour:false,cSub0:'#2266aa',cSub1:'#aa6622',cSub2:'#22aa66',cSub3:'#aa2266',

// ─── Parser ───────────────────────────────────────────────────────────────
function parseCDT(text){
  const fr={W:0,H:0,D:0,elements:[],openings:[],labels:[],nails:[],subs:[]};
  let inSub=null,robPts=[],robActive=false;
  function addEl(el){(inSub?inSub.elements:fr.elements).push(el);}
  // parse WxH from label: "...:WxH=45x140:..." → {cw:45, cd:140}
  function parseWxH(fields){
    for(let i=7;i<fields.length;i++){const m=(fields[i]||'').match(/WxH=(\d+)x(\d+)/);if(m)return{cw:+m[1],cd:+m[2]};}
    return null;
  }
  function parseL(fields){
    for(let i=7;i<fields.length;i++){const m=(fields[i]||'').match(/L=(\d+)/);if(m)return+m[1];}
    return null;
  }
  text.trim().split('\n').forEach(raw=>{
    const line=raw.trim().replace(/;$/,'');if(!line)return;const f=line.split(':'),tag=f[0];
    if(tag==='ELM'){fr.W=+f[1];fr.H=+f[2];fr.D=+f[3]||140;}
    else if(tag==='BS'||tag==='TS'){const wxh=parseWxH(f),ll=parseL(f);addEl({type:'plate',subType:tag==='BS'?'bottom':'top',x:+f[4],y:+f[5],z:0,w:+f[1],h:+f[2],d:+f[3],label:f[7]||tag,cw:wxh?wxh.cw:+f[1],cd:wxh?wxh.cd:+f[3],len:ll||+f[1]});}
    else if(tag==='ST'){const wxh=parseWxH(f),ll=parseL(f);addEl({type:'stud',x:+f[4],y:+f[5],z:+f[6]||0,w:+f[1],h:+f[2],d:+f[3],label:f[7]||'Stud',cw:wxh?wxh.cw:+f[1],cd:wxh?wxh.cd:+f[3],len:ll||+f[2]});}
    else if(tag==='STL'){const lb=f[7]||'';const lbl=lb.toLowerCase();const wxh=parseWxH(f),ll=parseL(f);
      if(lbl.includes('block')){addEl({type:'stud',x:+f[4],y:+f[5],z:+f[6]||0,w:+f[1],h:+f[2],d:+f[3],label:lb,cw:wxh?wxh.cw:+f[3],cd:wxh?wxh.cd:+f[2],len:ll||+f[1]});}
      else{addEl({type:lbl.includes('sill')?'sill':'header',x:+f[4],y:+f[5],z:+f[6]||0,w:+f[1],h:+f[2],d:+f[3],label:lb,cw:wxh?wxh.cw:+f[3],cd:wxh?wxh.cd:+f[2],len:ll||+f[1]});}}
    else if(tag.startsWith('BOI')||tag.startsWith('BOO'))addEl({type:'sheet',subType:tag,x:+f[4],y:+f[5],z:0,w:+f[1],h:+f[2],d:+f[3],label:f[8]||tag,cw:0,cd:0,len:0});
    else if(tag==='SUB')inSub={x:+f[4],y:+f[5],z:0,w:+f[1],h:+f[2],d:+f[3],elements:[],openings:[],uuid:f[7]};
    else if(tag==='SUE'){if(inSub){fr.subs.push(inSub);inSub=null;}}
    else if(tag==='ROB'){robActive=true;robPts=[{x:+f[1],y:+f[2]}];}
    else if(tag==='RL'&&robActive)robPts.push({x:+f[1],y:+f[2]});
    else if(tag==='ROE'){if(robPts.length>=3)(inSub?inSub.openings:fr.openings).push([...robPts]);robPts=[];robActive=false;}
    else if(tag==='FST')fr.nails.push({x1:+f[1],y1:+f[2],z1:+f[3],x2:+f[4],y2:+f[5],z2:+f[6]});
    else if(tag==='INK')fr.labels.push({x:+f[1],y:+f[2],z:0,text:f[4]||''});
  });
  return fr;
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function projectBox(el,v){if(v==='front')return{x:el.x,y:el.y,w:el.w,h:el.h};if(v==='top'||v==='bottom')return{x:el.x,y:el.z,w:el.w,h:el.d};if(v==='side')return{x:el.z,y:el.y,w:el.d,h:el.h};}
function makeT(v,cfg,ox,oy){const{PAD,scale:sc,W,H,D}=cfg;if(v==='front')return{tx:x=>ox+PAD+x*sc,ty:y=>oy+PAD+(H-y)*sc,ts:v2=>v2*sc};if(v==='top')return{tx:x=>ox+PAD+x*sc,ty:z=>oy+PAD+(D-z)*sc,ts:v2=>v2*sc};if(v==='bottom')return{tx:x=>ox+PAD+x*sc,ty:z=>oy+PAD+z*sc,ts:v2=>v2*sc};if(v==='side')return{tx:z=>ox+PAD+z*sc,ty:y=>oy+PAD+(H-y)*sc,ts:v2=>v2*sc};}
function makeInv(v,cfg,ox,oy){const{PAD,scale:sc,H,D}=cfg;if(v==='front')return{ix:sx=>(sx-ox-PAD)/sc,iy:sy=>H-((sy-oy-PAD)/sc)};if(v==='top')return{ix:sx=>(sx-ox-PAD)/sc,iy:sy=>D-((sy-oy-PAD)/sc)};if(v==='bottom')return{ix:sx=>(sx-ox-PAD)/sc,iy:sy=>(sy-oy-PAD)/sc};if(v==='side')return{ix:sx=>(sx-ox-PAD)/sc,iy:sy=>H-((sy-oy-PAD)/sc)};}
function sortV(els,v){return[...els].sort((a,b)=>{if(v==='front')return(a.z+a.d)-(b.z+b.d);if(v==='top')return(a.y+a.h)-(b.y+b.h);if(v==='bottom')return(b.y+b.h)-(a.y+a.h);if(v==='side')return(a.x+a.w)-(b.x+b.w);return 0;});}
function studType(label){const l=(label||'').toLowerCase();if(l.includes('king'))return'King Stud';if(l.includes('jackov'))return'Jack (over)';if(l.includes('jackund'))return'Jack (under)';if(l.includes('jack'))return'Jack Stud';if(l.includes('left')||l.includes('right'))return'End Stud';return'Stud';}

// ─── Colours ──────────────────────────────────────────────────────────────
const SUB_COLORS=['cSub0','cSub1','cSub2','cSub3'];
function elColor(el){if(S.subColour&&el._subIdx!==undefined)return S[SUB_COLORS[el._subIdx%4]];if(el.type==='sheet')return S.cSheet;return{stud:S.cStud,plate:S.cPlate,header:S.cHeader,sill:S.cSill}[el.type]||'#ccc';}

// ─── Draw ─────────────────────────────────────────────────────────────────
function drawBox(g,el,view,t){const p=projectBox(el,view);const x=t.tx(p.x),y=t.ty(p.y+p.h),w=t.ts(p.w),h=t.ts(p.h);if(w<0.3||h<0.3)return;const r=mkEl('rect',{x,y,width:w,height:h,fill:elColor(el),stroke:'#222','stroke-width':0.5,opacity:el.type==='sheet'?0.35:1},g);const title=document.createElementNS(NS,'title');title.textContent=`${el.label||el.type} ${el.cw}×${el.cd} L=${el.len} @ (${el.x},${el.y})`;r.appendChild(title);if(el._subIdx!==undefined)r.dataset.subIdx=el._subIdx;}
function drawEls(g,els,v,t){els.forEach(el=>drawBox(g,el,v,t));}
function drawOpenings(g,openings,t){openings.forEach(poly=>{mkEl('polygon',{points:poly.map(p=>`${t.tx(p.x)},${t.ty(p.y)}`).join(' '),fill:'none',stroke:S.cOpening,'stroke-width':1},g);});}
function drawNails(g,nails,t){nails.forEach(n=>mkEl('circle',{cx:t.tx(n.x1),cy:t.ty(n.y1),r:1.5,fill:'red',opacity:0.6},g));}
// X marks a cut-end cross-section. A single corner-to-corner cross is drawn where the end is
// seen face-on (studs in plan; headers/plates in side); in the FRONT elevation the two
// length-ends are marked. Members whose length lies in-plane in a plan/side view get no mark
// (avoids the litter of X's along the plate/header run).
function memberLenAxis(el){
  if(el.type==='plate'||el.type==='header'||el.type==='sill')return 'x';
  if(el.type==='stud'&&/block|nog/i.test(el.label||''))return 'x';
  return el.type==='stud'?'y':'x';
}
function drawCutEnds(g,els,view,t){
  function cross(ax,ay,bw,bh){
    mkEl('line',{x1:ax,y1:ay,x2:ax+bw,y2:ay+bh,stroke:'#333','stroke-width':0.7,opacity:0.7},g);
    mkEl('line',{x1:ax+bw,y1:ay,x2:ax,y2:ay+bh,stroke:'#333','stroke-width':0.7,opacity:0.7},g);
  }
  els.forEach(el=>{
    if(el.type==='sheet')return;
    const p=projectBox(el,view);if(!p)return;
    const x=t.tx(p.x),y=t.ty(p.y+p.h),w=t.ts(p.w),h=t.ts(p.h);
    if(w<2||h<2)return;
    const len=memberLenAxis(el);
    const faceOn=(view==='top'||view==='bottom')?(len==='y'):(view==='side')?(len==='x'):false;
    if(faceOn){cross(x,y,w,h);return;}                      // whole cross-section = the end face
    if(view==='front'){
      if(len==='y'){const s=Math.min(w,h*0.4);cross(x,y,w,s);cross(x,y+h-s,w,s);}   // stud: top & bottom
      else{const s=Math.min(h,w*0.4);cross(x,y,s,h);cross(x+w-s,y,s,h);}            // header/plate: left & right
    }
  });
}
// hatched strip on the sheeted face of the front view (driven by ELF)
function drawSheetSide(g,t,cfg){

}

// ─── Dimension helpers (use settings) ─────────────────────────────────────
function DC(){return S.cDim;}function DF(){return S.dimFont+'px';}function DLW(){return S.dimLine/10;}function DTK(){return S.dimTick;}function DEX(){return S.dimExt==='none'?undefined:S.dimExt;}
function dimLbl(g,x,y,label){const fs=S.dimFont,tw=Math.max(label.length*(fs*0.58),14);mkEl('rect',{x:x-tw/2,y:y-fs/2-1,width:tw,height:fs+2,rx:2,fill:'#fafafa',stroke:DC(),'stroke-width':0.3},g);mkEl('text',{x,y:y+fs*0.35,fill:DC(),'font-size':DF(),'text-anchor':'middle','font-family':'monospace'},g).textContent=label;}
function drawDimH(g,sx1,sx2,sy,off,label){
  const y=sy+off,tk=DTK(),lw=DLW(),ext=DEX();
  mkEl('line',{x1:sx1,y1:y,x2:sx2,y2:y,stroke:DC(),'stroke-width':lw},g);
  mkEl('line',{x1:sx1,y1:y-tk,x2:sx1,y2:y+tk,stroke:DC(),'stroke-width':lw},g);
  mkEl('line',{x1:sx2,y1:y-tk,x2:sx2,y2:y+tk,stroke:DC(),'stroke-width':lw},g);
  const ea={x1:sx1,y1:sy,x2:sx1,y2:y,stroke:DC(),'stroke-width':lw*0.6};if(ext)ea['stroke-dasharray']=ext;mkEl('line',ea,g);
  const eb={x1:sx2,y1:sy,x2:sx2,y2:y,stroke:DC(),'stroke-width':lw*0.6};if(ext)eb['stroke-dasharray']=ext;mkEl('line',eb,g);
  dimLbl(g,(sx1+sx2)/2,y,label);
}
function drawDimV(g,sy1,sy2,sx,off,label){
  const x=sx+off,top=Math.min(sy1,sy2),bot=Math.max(sy1,sy2),tk=DTK(),lw=DLW(),ext=DEX();
  mkEl('line',{x1:x,y1:top,x2:x,y2:bot,stroke:DC(),'stroke-width':lw},g);
  mkEl('line',{x1:x-tk,y1:top,x2:x+tk,y2:top,stroke:DC(),'stroke-width':lw},g);
  mkEl('line',{x1:x-tk,y1:bot,x2:x+tk,y2:bot,stroke:DC(),'stroke-width':lw},g);
  const ea={x1:sx,y1:top,x2:x,y2:top,stroke:DC(),'stroke-width':lw*0.6};if(ext)ea['stroke-dasharray']=ext;mkEl('line',ea,g);
  const eb={x1:sx,y1:bot,x2:x,y2:bot,stroke:DC(),'stroke-width':lw*0.6};if(ext)eb['stroke-dasharray']=ext;mkEl('line',eb,g);
  dimLbl(g,x,(top+bot)/2,label);

// ─── Chain dims — simple: dimension between each stud right-edge to next left-edge ──
// Adjacent studs (gap < 5mm) are merged into one block, labeled as combined width
function drawChainDims(g,elements,t){
  const studs=elements.filter(e=>e.type==='stud').sort((a,b)=>a.x-b.x);
  if(studs.length<2)return;

  // Build blocks: each block is {left, right} in mm
  // Merge studs that touch or overlap (right edge >= next left edge - 2)
  const blocks=[];
  let curL=studs[0].x, curR=studs[0].x+studs[0].w, curN=1;
  for(let i=1;i<studs.length;i++){
    const sl=studs[i].x, sr=studs[i].x+studs[i].w;
    if(sl <= curR+2){ // touching or overlapping
      curR=Math.max(curR,sr);
      curN++;
    } else {
      blocks.push({l:curL, r:curR, n:curN});
      curL=sl; curR=sr; curN=1;
    }
  }
  blocks.push({l:curL, r:curR, n:curN});

  const yA=t.ty(0);
  const baseOff=Math.max(18,S.chainOff1);
  const rowGap=Math.max(14,S.dimFont+6);
  const rows=[];
  function labelWidth(label){return Math.max(label.length*(S.dimFont*0.62),18)+8;}
  function placeRow(cx,lbl){
    const half=labelWidth(lbl)/2;
    const span={l:cx-half,r:cx+half};
    let row=0;
    while(rows[row]&&rows[row].some(s=>!(span.r<s.l||span.l>s.r)))row++;
    if(!rows[row])rows[row]=[];
    rows[row].push(span);
    return row;
  }

  // Dimension gaps between blocks, assigning as many rows as needed.
  for(let i=0;i<blocks.length-1;i++){
    const gapMM=Math.round(blocks[i+1].l - blocks[i].r);
    if(gapMM>2){
      const sx1=t.tx(blocks[i].r),sx2=t.tx(blocks[i+1].l),lbl=gapMM+'';
      const row=placeRow((sx1+sx2)/2,lbl);
      drawDimH(g,sx1,sx2,yA,baseOff+row*rowGap,lbl);
    }
  }

  // Label merged blocks (2+ studs) with combined width only.
  blocks.forEach(b=>{
    if(b.n>1){
      const bw=Math.round(b.r-b.l);
      const sx1=t.tx(b.l),sx2=t.tx(b.r),lbl=bw+'';
      const row=placeRow((sx1+sx2)/2,lbl);
      drawDimH(g,sx1,sx2,yA,baseOff+row*rowGap,lbl);
    }
  });
}

// ─── Origin dims: distance from x=0 to outside (right) edge of each stud cluster ──
// Uses studs sitting on/near bottom plate (under studs), not over studs
// One row of origin dims from x=0: clusters touching studs, labels the chosen edge (left/right).
// dir=+1 draws below the anchor (under-studs), dir=-1 draws above (over-studs). anchorMm = frame y to hang from.
function drawOriginRow(g,studs,t,edge,dir,anchorMm,baseOff){
  if(!studs.length)return;
  studs=studs.slice().sort((a,b)=>a.x-b.x);
  const blocks=[];let curL=studs[0].x,curR=studs[0].x+studs[0].w;
  for(let i=1;i<studs.length;i++){const sl=studs[i].x,sr=studs[i].x+studs[i].w;
    if(sl<=curR+2){curR=Math.max(curR,sr);}else{blocks.push({l:curL,r:curR});curL=sl;curR=sr;}}
  blocks.push({l:curL,r:curR});
  const fs=S.dimFont,lw=DLW(),ext=DEX(),yBase=t.ty(anchorMm),rowGap=fs+5;
  const rows=[];                                   // collision avoidance: stack colliding labels into rows
  function placeRow(cx,w){const half=w/2,sp={l:cx-half,r:cx+half};let r=0;
    while(rows[r]&&rows[r].some(s=>!(sp.r<s.l||sp.l>s.r)))r++;(rows[r]||(rows[r]=[])).push(sp);return r;}
  blocks.forEach(b=>{
    const val=Math.round(edge==='r'?b.r:b.l),sx=t.tx(val),lblW=Math.max((''+val).length*fs*0.62,16)+4;
    const row=placeRow(sx,lblW),labelY=yBase+dir*((baseOff||12)+fs+row*rowGap);
    const la={x1:sx,y1:yBase+dir*2,x2:sx,y2:labelY-dir*fs,stroke:DC(),'stroke-width':lw*0.6};
    if(ext)la['stroke-dasharray']=ext;mkEl('line',la,g);
    mkEl('line',{x1:sx-2,y1:labelY-dir*fs,x2:sx+2,y2:labelY-dir*fs,stroke:DC(),'stroke-width':lw},g);
    mkEl('text',{x:sx,y:labelY,fill:DC(),'font-size':fs+'px','text-anchor':'middle','font-family':'monospace'},g).textContent=val+'';
  });
}
function drawOriginDims(g,elements,t){
  const cb=document.getElementById('chkOriginR');
  const edge=(cb&&cb.checked)?'r':'l';
  drawOriginRow(g,elements.filter(e=>e.type==='stud'&&e.y<100),t,edge,+1,0,16);         // under-studs, below
  const over=elements.filter(e=>e.type==='stud'&&/jackov/i.test(e.label||''));          // over-opening studs, above
  if(over.length){const top=Math.max.apply(null,over.map(e=>e.y+e.h));drawOriginRow(g,over,t,edge,-1,top,12);}
}

  for(let i=1;i<studs.length;i++){
    const sl=studs[i].x,sr=studs[i].x+studs[i].w;
    if(sl<=curR+2){curR=Math.max(curR,sr);curN++;}
    else{blocks.push({l:curL,r:curR,n:curN});curL=sl;curR=sr;curN=1;}
  }
  blocks.push({l:curL,r:curR,n:curN});

  const fs=S.dimFont,lw=DLW(),ext=DEX(),yBase=t.ty(0);

  function labelWidth(label){return Math.max(label.length*(fs*0.6),18)+6;}
  function placeRow(cx,lbl){
    const half=labelWidth(lbl)/2,span={l:cx-half,r:cx+half};
    let row=0;
    while(rows[row]&&rows[row].some(s=>!(span.r<s.l||span.l>s.r)))row++;

    }
  });
}

// ─── Spec label positioning helper ────────────────────────────────────────
function placeSpecLabel(g,el,text,fontKey,orientKey,placeKey,offKey,t){
  const fs=S[fontKey],orient=+S[orientKey],place=S[placeKey],off=S[offKey];
  // element centre in screen coords
  let sx=t.tx(el.x+el.w/2), sy=t.ty(el.y+el.h/2);
  // adjust placement
  if(place==='above'){sy=t.ty(el.y+el.h)-fs-2;}
  else if(place==='below'){sy=t.ty(el.y)+fs+2;}
  else if(place==='left'){sx=t.tx(el.x)-4;} 
  else if(place==='right'){sx=t.tx(el.x+el.w)+4;}
  // apply offset
  sy+=off;
  const attrs={x:sx,y:sy,fill:'#333','font-size':fs+'px','font-family':'monospace','font-weight':'bold'};
  if(place==='left')attrs['text-anchor']='end';
  else if(place==='right')attrs['text-anchor']='start';
  else attrs['text-anchor']='middle';
  if(orient!==0)attrs.transform=`rotate(${orient},${sx},${sy})`;
  mkEl('text',attrs,g).textContent=text;
}

function drawSpecLabels(g,elements,t){
  // headers — format: qty/WxH L=len @ y

  if(headers.length){
    const byY={};headers.forEach(h=>{const k=Math.round(h.y);if(!byY[k])byY[k]=[];byY[k].push(h);});

      placeSpecLabel(g,{x:e.x,y:e.y,w:e.w,h:e.h},lbl,'hdrFont','hdrOrient','hdrPlace','hdrOff',t);
    });
  }
  // sills
  const sills=elements.filter(e=>e.type==='sill');
  if(sills.length){
    const byY={};sills.forEach(s=>{const k=Math.round(s.y);if(!byY[k])byY[k]=[];byY[k].push(s);});
    Object.values(byY).forEach(grp=>{
      const e=grp[0];const lbl=`${grp.length}/${e.cw}×${e.cd} L=${e.len} @ ${Math.round(e.y)}`;
      placeSpecLabel(g,{x:e.x,y:e.y,w:e.w,h:e.h},lbl,'sillFont','sillOrient','sillPlace','sillOff',t);
    });
  }
  // (jack over/under labels removed — not shown in specs)
}

// ─── Clear opening dims (frame only — studs/headers/sills, not sheets) ───
function calcClearOpening(elements){
  // find opening bounds from jack studs, headers, sills
  const overs=elements.filter(e=>e.type==='stud'&&(e.label||'').toLowerCase().includes('jackov'));
  const unders=elements.filter(e=>e.type==='stud'&&(e.label||'').toLowerCase().includes('jackund'));
  const headers=elements.filter(e=>e.type==='header');
  const sills=elements.filter(e=>e.type==='sill');
  if(!overs.length&&!headers.length)return[];
  // clear width = distance between innermost jacks
  const allJacks=[...overs,...unders];
  if(allJacks.length<2&&headers.length===0)return[];
  // use header span for width
  let minX,maxX,minY,maxY;
  if(headers.length){
    const h=headers[0];
    minX=h.x;maxX=h.x+h.w;// header spans the opening width (inner studs to inner studs typically)
    maxY=h.y;// bottom of header = top of clear opening
  }
  if(sills.length){
    const s=sills[0];
    minY=s.y+s.h;// top of sill = bottom of clear opening
    if(!minX){minX=s.x;maxX=s.x+s.w;}
  }
  if(!minY)minY=0;if(!maxY){if(overs.length)maxY=overs[0].y;else return[];}
  if(minX===undefined)return[];
  return[{x:minX,y:minY,w:maxX-minX,h:maxY-minY}];
}

function drawOpeningCentreDims(g,elements,t){
  const opens=calcClearOpening(elements);
  opens.forEach(o=>{
    const cx=o.x+o.w/2, cy=o.y+o.h/2;
    const fs=S.dimFont+1;
    mkEl('text',{x:t.tx(cx),y:t.ty(cy)-2,fill:S.cOpening,'font-size':fs+'px','text-anchor':'middle','font-family':'monospace','font-weight':'bold'},g).textContent=`${Math.round(o.w)} × ${Math.round(o.h)}`;
  });
}

function drawSubRefs(g,subs,t,viewBox){
  const rows=[],rowGap=16,labelH=14,labelW=46;
  const minX=viewBox.x+36,maxX=viewBox.x+viewBox.w-36;
  const baseY=t.ty(viewBox.realH)-24;
  const refs=subs.map((sub,si)=>({
    sub,si,
    cx:t.tx(sub.x+sub.w/2),
    top:t.ty(sub.y+sub.h),
    label:'SUB '+(si+1),
    col:S.subColour?S[SUB_COLORS[si%4]]:DC()
  })).sort((a,b)=>a.cx-b.cx);
  refs.forEach(ref=>{
    let x=Math.max(minX,Math.min(maxX,ref.cx));
    let row=0,span;
    do{
      span={l:x-labelW/2,r:x+labelW/2};
      if(!rows[row])rows[row]=[];
      if(!rows[row].some(s=>!(span.r<s.l||span.l>s.r)))break;
      row++;
    }while(row<8);
    rows[row].push(span);
    const y=baseY-row*rowGap;
    if(Math.abs(x-ref.cx)>4||row>0){
      mkEl('line',{x1:ref.cx,y1:ref.top-4,x2:x,y2:y+4,stroke:ref.col,'stroke-width':0.8,'stroke-dasharray':'2,2','pointer-events':'none'},g);
    }
    mkEl('rect',{x:x-labelW/2,y:y-labelH+3,width:labelW,height:labelH,rx:3,fill:'#fafafa',stroke:ref.col,'stroke-width':0.8,'pointer-events':'none'},g);
    mkEl('text',{x,y,fill:ref.col,'font-size':'10px','text-anchor':'middle','font-family':'sans-serif','font-weight':'bold','pointer-events':'none'},g).textContent=ref.label;
  });
}

// ─── Sub dims (respects toggles) ─────────────────────────────────────────
function drawSubDims(g,elements,t,opts){
  if(!opts.showDims) return;
  const minX=Math.min(...elements.map(e=>e.x));
  const maxX=Math.max(...elements.map(e=>e.x+e.w));
  const minY=Math.min(...elements.map(e=>e.y));
  const maxY=Math.max(...elements.map(e=>e.y+e.h));
  const rightEdge=t.tx(maxX);
  drawDimH(g,t.tx(minX),t.tx(maxX),t.ty(minY),26,Math.round(maxX-minX)+'');
  drawDimV(g,t.ty(maxY),t.ty(minY),t.tx(minX),-18,Math.round(maxY-minY)+'');
  const headers=elements.filter(e=>e.type==='header');
  if(headers.length){const h=headers[0];drawDimV(g,t.ty(h.y+h.h),t.ty(h.y),rightEdge,16,Math.round(h.h)+' hdr');}
  const sills=elements.filter(e=>e.type==='sill');
  if(sills.length){const s=sills[0];drawDimV(g,t.ty(s.y+s.h),t.ty(s.y),rightEdge,34,Math.round(s.h)+' sill');}
  const studs=elements.filter(e=>e.type==='stud');
  if(studs.length){
    mkEl('text',{x:t.tx((minX+maxX)/2),y:t.ty(minY)-6,fill:'#333','font-size':'10px','text-anchor':'middle','font-family':'monospace'},g).textContent=studs.length+'nr';
  }
}

// ─── Snap / Measure ──────────────────────────────────────────────────────
function buildSnaps(els){
  const pts=[];
  els.forEach(el=>{
    const x1=el.x,x2=el.x+el.w,y1=el.y,y2=el.y+el.h,cx=(x1+x2)/2,cy=(y1+y2)/2;
    pts.push({x:x1,y:y1},{x:x2,y:y1},{x:x1,y:y2},{x:x2,y:y2},{x:cx,y:y1},{x:cx,y:y2},{x:x1,y:cy},{x:x2,y:cy},{x:cx,y:cy});
  });
  return pts;
}
function snapPt(pt,spts,tol){
  let best=null,bestD=tol||60;
  spts.forEach(p=>{const d=Math.hypot(p.x-pt.x,p.y-pt.y);if(d<bestD){bestD=d;best=p;}});
  return best?{...best,snapped:true}:pt;
}
function drawMeasureLine(g,sx1,sy1,sx2,sy2,label){const mc=S.cMeasure;mkEl('line',{x1:sx1,y1:sy1,x2:sx2,y2:sy2,stroke:mc,'stroke-width':1.5,'stroke-dasharray':'4,3'},g);mkEl('circle',{cx:sx1,cy:sy1,r:3,fill:mc},g);mkEl('circle',{cx:sx2,cy:sy2,r:3,fill:mc},g);const mx=(sx1+sx2)/2,my=(sy1+sy2)/2,tw=Math.max(label.length*6,36);mkEl('rect',{x:mx-tw/2,y:my-8,width:tw,height:14,rx:3,fill:mc},g);mkEl('text',{x:mx,y:my+3,fill:'#fff','font-size':'10px','text-anchor':'middle','font-family':'monospace','font-weight':'bold'},g).textContent=label;}

// ─── Cut list (uses cw, cd, len from WxH and L= in CDT) ──────────────────
function buildCutList(elements){
  const groups={};
  elements.forEach(el=>{
    if(el.type==='sheet')return;
    let typeName;
    if(el.type==='plate')typeName=el.subType==='bottom'?'Bottom Plate':'Top Plate';
    else if(el.type==='header')typeName='Header';
    else if(el.type==='sill')typeName='Sill';
    else if(el.type==='stud')typeName=studType(el.label);
    else typeName=el.type;
    const a=Math.max(el.cw||0,el.cd||0),b=Math.min(el.cw||0,el.cd||0);
    const dim=`${a}×${b}`;                 // normalise to larger×smaller (140×45, not 45×140)
    const len=el.len;
    const key=`${typeName}|${dim}|${len}`;
    if(!groups[key])groups[key]={type:typeName,dim,len,qty:0};
    groups[key].qty++;
  });
  return Object.values(groups).sort((a,b)=>a.type.localeCompare(b.type)||b.len-a.len);
}
function renderCutList(elements){
  const cl=document.getElementById('cutlist');const items=buildCutList(elements);
  const showCutList=document.getElementById('chkCutList').checked;
  cl.classList.toggle('hidden',!showCutList);
  if(!showCutList){cl.innerHTML='';return;}
  let html=`<h4>Timber Cut List ${cutListCollapsed?'▸':'▾'}</h4><table><tr><th>Type</th><th>Size</th><th>Len</th><th>Qty</th></tr>`;
  items.forEach(it=>{html+=`<tr><td>${it.type}</td><td>${it.dim}</td><td>${it.len}</td><td>${it.qty}</td></tr>`;});
  html+='</table>';cl.innerHTML=html;
  cl.classList.toggle('collapsed',cutListCollapsed);
  const head=cl.querySelector('h4');
  head.onclick=e=>{e.stopPropagation();if(cutListDidDrag){cutListDidDrag=false;return;}cutListCollapsed=!cutListCollapsed;renderCutList(elements);};
  head.onmousedown=e=>{cutListDrag={x:e.clientX,y:e.clientY,left:cl.offsetLeft,top:cl.offsetTop};cutListDidDrag=false;e.preventDefault();};
}

// ─── Parse & setup ────────────────────────────────────────────────────────
const builtInFr=parseCDT(RAW);
const fr=parseCDT(RAW);const svgEl=document.getElementById('svg');
let cutListCollapsed=false;
let cutListDrag=null,cutListDidDrag=false,cutListCustomPos=true;
let svgView={x:0,y:0,w:0,h:0,baseW:0,baseH:0};
function applySvgView(){svgEl.setAttribute('viewBox',`${svgView.x} ${svgView.y} ${svgView.w} ${svgView.h}`);}
function resetSvgView(totalW,totalH){svgView={x:0,y:0,w:totalW,h:totalH,baseW:totalW,baseH:totalH};applySvgView();}

let activeTab='all';
function buildTabs(){}                 // single-sub app: no tabs
function selectSub(idx){activeTab=''+idx;render();}

function mirrorElementsForBack(els,W){
  return els.map(e=>({...e,x:W-e.x-e.w}));
}
function mirrorOpeningsForBack(openings,W){
  return openings.map(poly=>poly.map(pt=>({...pt,x:W-pt.x})));
}
function mirrorSubsForBack(subs,W){
  return subs.map(s=>({...s,x:W-s.x-s.w}));
}

// ─── Render ───────────────────────────────────────────────────────────────
let viewRegions=[];
function render(){
  svgEl.innerHTML='';viewRegions=[];
  const showF=document.getElementById('chkFront').checked,showT=document.getElementById('chkTop').checked,showS=document.getElementById('chkSide').checked;
  const showBack=document.getElementById('chkBackView').checked;
  const showB=document.getElementById('chkBottom')?document.getElementById('chkBottom').checked:false;
  const sideHideKing=document.getElementById('chkHideKing')?document.getElementById('chkHideKing').checked:false;
  const showCutEnds=document.getElementById('chkCutEnds')?document.getElementById('chkCutEnds').checked:false;
  const showSheetSide=document.getElementById('chkSheetSide')?document.getElementById('chkSheetSide').checked:false;
  const showDims=document.getElementById('chkDims').checked,showStudDims=document.getElementById('chkStudDims').checked,showOpenDims=document.getElementById('chkOpenDims').checked;
  const showSpecs=document.getElementById('chkSpecs').checked,showRouting=document.getElementById('chkRouting').checked;
  const showNails=document.getElementById('chkNails').checked,showSheets=document.getElementById('chkSheets').checked;
  const showOriginDims=document.getElementById('chkOriginDims').checked;
  const subIdx=activeTab;
  let elements,openings,W,H,D,isSubView=false;
  if(subIdx==='all'){
    elements=[...fr.elements];fr.subs.forEach((s,si)=>{s.elements.forEach(e=>{elements.push({...e,_subIdx:si});});});
    openings=[...fr.openings,...fr.subs.flatMap(s=>s.openings)];W=fr.W;H=fr.H;D=fr.D;
  } else {
    const si=+subIdx,sub=fr.subs[si],rawEls=sub.elements,rawOpen=sub.openings;
    const xs=rawEls.map(e=>e.x),ys=rawEls.map(e=>e.y),zs=rawEls.map(e=>e.z||0);
    const xe=rawEls.map(e=>e.x+e.w),ye=rawEls.map(e=>e.y+e.h),ze=rawEls.map(e=>(e.z||0)+e.d);
    const mnX=Math.min(...xs),mnY=Math.min(...ys),mnZ=Math.min(...zs);
    W=Math.max(...xe)-mnX;H=Math.max(...ye)-mnY;D=Math.max(...ze)-mnZ||fr.D;
    elements=rawEls.map(e=>({...e,x:e.x-mnX,y:e.y-mnY,z:(e.z||0)-mnZ}));
    openings=rawOpen.map(p=>p.map(pt=>({x:pt.x-mnX,y:pt.y-mnY})));isSubView=true;
  }
  const displaySubs=subIdx==='all'?(showBack?mirrorSubsForBack(fr.subs,W):fr.subs):[];
  if(showBack){
    elements=mirrorElementsForBack(elements,W);
    openings=mirrorOpeningsForBack(openings,W);
  }
  const snapPts=buildSnaps(elements);const scale=S.scale/100;const cfg={W,H,D,scale,PAD:(isSubView?64:(showStudDims?78:50))};const gap=10;
  const frontW=cfg.W*scale+cfg.PAD*2,frontH=cfg.H*scale+cfg.PAD*2;const planH=cfg.D*scale+cfg.PAD*2,sideW=cfg.D*scale+cfg.PAD*2;
  // vertical stack: TOP (plan) · FRONT · BOTTOM (plan); SIDE sits right of FRONT
  const topOy=0,frontOy=(showT?planH+gap:0),bottomOy=frontOy+(showF?frontH+gap:0);
  const frontOx=0,topOx=0,bottomOx=0,sideOx=(showF?frontW:0)+gap,sideOy=frontOy;
  let totalW=(showF?frontW:(showS?0:200))+(showS?gap+sideW:0);
  let totalH=(showT?planH+gap:0)+(showF?frontH:0)+(showB?gap+planH:0);
  if(!showF&&!showT&&!showS&&!showB){totalW=200;totalH=40;}
  if(isSubView){totalW+=80;totalH+=50;}
  if(showOriginDims){totalH+=60;}
  svgEl.setAttribute('width',totalW);svgEl.setAttribute('height',totalH);
  resetSvgView(totalW,totalH);
  const cl=document.getElementById('cutlist');
  const cutLeft=showS?sideOx:(showF?frontW+gap:10);
  const cutTop=frontOy;
  if(!cutListCustomPos){
    cl.style.left=Math.round(cutLeft)+'px';
    cl.style.top=Math.round(cutTop)+'px';
  }

  function doView(view,ox,oy,pxW,pxH){
    const t=makeT(view,cfg,ox,oy),inv=makeInv(view,cfg,ox,oy);const g=mkEl('g',{},svgEl);
    let label=view.toUpperCase();if(view==='front'&&showBack)label='BACK';if(view==='top')label='TOP (plan)';if(view==='bottom')label='BOTTOM (plan)';if(isSubView)label+=' — Sub '+(+subIdx+1);
    mkEl('text',{x:ox+10,y:oy+15},svgEl).textContent=label;
    let list=[...elements];if(view==='top'||view==='bottom')list=list.filter(e=>e.type!=='plate');if(view==='side'&&sideHideKing)list=list.filter(e=>!(e.type==='stud'&&/king/i.test(e.label||'')));if(!showSheets)list=list.filter(e=>e.type!=='sheet');
    drawEls(g,sortV(list,view),view,t);
    if(showCutEnds)drawCutEnds(g,list,view,t);
    if(showSheetSide&&view==='front')drawSheetSide(g,t,cfg);
    if(showRouting&&view==='front')drawOpenings(g,openings,t);
    if(showOpenDims&&view==='front'&&!isSubView)drawOpeningCentreDims(mkEl('g',{},svgEl),elements,t);
    if(showNails&&view==='front'&&subIdx==='all')drawNails(g,fr.nails,t);
    if(showDims&&!isSubView){const gD=mkEl('g',{},svgEl);
      if(view==='front'){drawDimV(gD,t.ty(H),t.ty(0),t.tx(0),-16,H+'');drawDimH(gD,t.tx(0),t.tx(W),t.ty(H),-18,W+'');}
      else if(view==='top'){drawDimH(gD,t.tx(0),t.tx(W),t.ty(0),12,W+'');drawDimV(gD,t.ty(D),t.ty(0),t.tx(0),-12,D+'');}
      else if(view==='bottom'){drawDimH(gD,t.tx(0),t.tx(W),t.ty(D),12,W+'');drawDimV(gD,t.ty(0),t.ty(D),t.tx(0),-12,D+'');}
      else if(view==='side'){drawDimH(gD,t.tx(0),t.tx(D),t.ty(0),12,D+'');drawDimV(gD,t.ty(H),t.ty(0),t.tx(0),-12,H+'');}}
    if(showStudDims&&view==='front'&&!isSubView){const gC=mkEl('g',{},svgEl);drawDimH(gC,t.tx(0),t.tx(W),t.ty(0),18,W+'');drawChainDims(mkEl('g',{},svgEl),elements,t);}
    if(showOriginDims&&view==='front')drawOriginDims(mkEl('g',{},svgEl),elements,t);
    if(showSpecs&&view==='front')drawSpecLabels(mkEl('g',{},svgEl),elements,t);
    if(isSubView&&view==='front')drawSubDims(mkEl('g',{},svgEl),elements,t,{showDims,showStudDims});
    if(subIdx==='all'&&view==='front'){
      displaySubs.forEach((sub,si)=>{
        const sx=t.tx(sub.x),sy=t.ty(sub.y+sub.h),sw=t.ts(sub.w),sh=t.ts(sub.h);
        const col=S.subColour?S[SUB_COLORS[si%4]]:DC();
        const rect=mkEl('rect',{x:sx,y:sy,width:sw,height:sh,fill:S.subColour?(col+'18'):'none',stroke:col,'stroke-width':1,'stroke-dasharray':'6,3',cursor:'pointer'},g);
        rect.dataset.subIdx=si;
      });
      drawSubRefs(mkEl('g',{},svgEl),displaySubs,t,{x:ox,y:oy,w:pxW,h:pxH,realH:H});
    }
    viewRegions.push({view,ox,oy,pxW,pxH,t,inv,snapPts});
  }
  if(showT)doView('top',topOx,topOy,frontW,planH);
  if(showF)doView('front',frontOx,frontOy,frontW,frontH);
  if(showB)doView('bottom',bottomOx,bottomOy,frontW,planH);
  if(showS)doView('side',sideOx,sideOy,sideW,frontH);
  window._gMeasure=mkEl('g',{},svgEl);
  window._gSnap=mkEl('g',{},svgEl);
  renderCutList(elements);
}

// ─── Click ────────────────────────────────────────────────────────────────
let measureActive=false,measureP1=null;
function hitView(sx,sy){for(const r of viewRegions)if(sx>=r.ox&&sx<=r.ox+r.pxW&&sy>=r.oy&&sy<=r.oy+r.pxH)return r;return null;}
function drawSnapMarker(region,pt){
  if(!window._gSnap)window._gSnap=mkEl('g',{},svgEl);
  window._gSnap.innerHTML='';
  if(!pt||!pt.snapped)return;
  mkEl('circle',{cx:region.t.tx(pt.x),cy:region.t.ty(pt.y),r:5,fill:'none',stroke:S.cMeasure,'stroke-width':1.6},window._gSnap);
  mkEl('line',{x1:region.t.tx(pt.x)-7,y1:region.t.ty(pt.y),x2:region.t.tx(pt.x)+7,y2:region.t.ty(pt.y),stroke:S.cMeasure,'stroke-width':1},window._gSnap);
  mkEl('line',{x1:region.t.tx(pt.x),y1:region.t.ty(pt.y)-7,x2:region.t.tx(pt.x),y2:region.t.ty(pt.y)+7,stroke:S.cMeasure,'stroke-width':1},window._gSnap);
}
svgEl.addEventListener('click',e=>{
  if(svgDidDrag){svgDidDrag=false;e.preventDefault();return;}
  const target=e.target;if(!measureActive&&target.dataset&&target.dataset.subIdx!==undefined){selectSub(+target.dataset.subIdx);return;}
  if(!measureActive)return;const pt=svgEl.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  const sp=pt.matrixTransform(svgEl.getScreenCTM().inverse());const region=hitView(sp.x,sp.y);if(!region)return;
  const real={x:region.inv.ix(sp.x),y:region.inv.iy(sp.y)};const snapped=snapPt(real,region.snapPts,80);const status=document.getElementById('mStatus');
  drawSnapMarker(region,snapped);
  if(!measureP1){measureP1={x:snapped.x,y:snapped.y,region};status.textContent=`P1:(${Math.round(snapped.x)},${Math.round(snapped.y)}) [${region.view}] ${snapped.snapped?'snap ':''}→ P2`;}
  else{if(measureP1.region.view!==region.view){status.textContent='P2 must be same view';measureP1=null;return;}
    const dx=snapped.x-measureP1.x,dy=snapped.y-measureP1.y,dist=Math.sqrt(dx*dx+dy*dy);
    drawMeasureLine(window._gMeasure,region.t.tx(measureP1.x),region.t.ty(measureP1.y),region.t.tx(snapped.x),region.t.ty(snapped.y),Math.round(dist)+'mm');
    status.textContent=`${Math.round(dist)}mm (Δ${Math.round(Math.abs(dx))},${Math.round(Math.abs(dy))}) ${snapped.snapped?'snapped':''}`;measureP1=null;}
});
svgEl.addEventListener('mousemove',e=>{
  if(!measureActive)return;
  const pt=svgEl.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  const sp=pt.matrixTransform(svgEl.getScreenCTM().inverse());const region=hitView(sp.x,sp.y);if(!region)return;
  const real={x:region.inv.ix(sp.x),y:region.inv.iy(sp.y)};
  drawSnapMarker(region,snapPt(real,region.snapPts,80));
});

let svgDrag=null,svgDidDrag=false;
svgEl.addEventListener('wheel',e=>{
  if(!svgView.baseW)return;
  e.preventDefault();
  const rect=svgEl.getBoundingClientRect();
  const mx=svgView.x+((e.clientX-rect.left)/rect.width)*svgView.w;
  const my=svgView.y+((e.clientY-rect.top)/rect.height)*svgView.h;
  const factor=e.deltaY<0?0.85:1.18;
  const nextW=Math.min(svgView.baseW*3,Math.max(svgView.baseW/8,svgView.w*factor));
  const nextH=Math.min(svgView.baseH*3,Math.max(svgView.baseH/8,svgView.h*factor));
  svgView.x=mx-((e.clientX-rect.left)/rect.width)*nextW;
  svgView.y=my-((e.clientY-rect.top)/rect.height)*nextH;
  svgView.w=nextW;svgView.h=nextH;applySvgView();
},{passive:false});
svgEl.addEventListener('mousedown',e=>{
  if(measureActive||e.button!==0)return;
  svgDrag={x:e.clientX,y:e.clientY,vx:svgView.x,vy:svgView.y};
  svgDidDrag=false;svgEl.classList.add('panning');e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(cutListDrag){
    const cl=document.getElementById('cutlist');
    const dx=e.clientX-cutListDrag.x,dy=e.clientY-cutListDrag.y;
    if(Math.abs(dx)+Math.abs(dy)>3)cutListDidDrag=true;
    cl.style.left=Math.max(0,cutListDrag.left+dx)+'px';
    cl.style.top=Math.max(0,cutListDrag.top+dy)+'px';
    cutListCustomPos=true;
    return;
  }
  if(!svgDrag)return;
  const rect=svgEl.getBoundingClientRect();
  const dx=(e.clientX-svgDrag.x)/rect.width*svgView.w;
  const dy=(e.clientY-svgDrag.y)/rect.height*svgView.h;
  if(Math.abs(e.clientX-svgDrag.x)+Math.abs(e.clientY-svgDrag.y)>3)svgDidDrag=true;
  svgView.x=svgDrag.vx-dx;svgView.y=svgDrag.vy-dy;applySvgView();
});
window.addEventListener('mouseup',()=>{svgDrag=null;cutListDrag=null;svgEl.classList.remove('panning');});

document.getElementById('btnMeasure').onclick=()=>{measureActive=!measureActive;document.getElementById('btnMeasure').classList.toggle('active',measureActive);svgEl.classList.toggle('measuring',measureActive);document.getElementById('mStatus').textContent=measureActive?'Snap measure: click P1...':'';if(!measureActive){measureP1=null;if(window._gSnap)window._gSnap.innerHTML='';}};
document.getElementById('btnClear').onclick=()=>{if(window._gMeasure)window._gMeasure.innerHTML='';if(window._gSnap)window._gSnap.innerHTML='';measureP1=null;document.getElementById('mStatus').textContent='';};
document.getElementById('btnZoomReset').onclick=()=>resetSvgView(svgView.baseW,svgView.baseH);
['chkFront','chkBackView','chkTop','chkSide','chkBottom','chkHideKing','chkDims','chkStudDims','chkOpenDims','chkSpecs','chkRouting','chkNails','chkSheets','chkOriginDims','chkOriginR','chkCutEnds','chkSheetSide','chkCutList'].forEach(id=>{const el=document.getElementById(id);if(el)el.onchange=render;});
// ─── QR / V1 payload loading ────────────────────────────────────────────────
let subMeta={name:'',elf:'I',ref:''};
function loadV1(code){
  code=(code||'').trim(); if(!code) return false;
  let dec; try{ dec=QRCodec.decodeV1(code); }catch(e){ alert('QR decode failed: '+e.message); return false; }
  const nf=parseCDT(dec.cdt);
  fr.W=nf.W;fr.H=nf.H;fr.D=nf.D;fr.elements=nf.elements;fr.openings=nf.openings;fr.labels=nf.labels;fr.nails=nf.nails;fr.subs=nf.subs;
  subMeta={name:dec.name,elf:dec.elf,ref:dec.ref};
  activeTab='all';
  // ELF-driven default orientation: show the sheeted side. Provisional map (needs an OUTSIDE sample): INSIDE -> back view.
  const back=document.getElementById('chkBackView'); if(back) back.checked=(dec.elf==='I');
  const lbl=document.getElementById('v1sub'); if(lbl) lbl.textContent=(dec.name||'Sub')+(dec.ref?(' · '+dec.ref):'');
  document.title=(dec.name||'Sub')+(dec.ref?(' · '+dec.ref):'')+' — QR Sub Viewer';
  buildTabs();render();
  return true;
}
function loadV1FromHash(){
  let h=(location.hash||'').replace(/^#/,''); if(!h) return false;
  try{ h=decodeURIComponent(h); }catch(e){}
  if(h.indexOf('V1*')===0) return loadV1(h);
  return false;
}
window.addEventListener('hashchange',loadV1FromHash);
{ const b=document.getElementById('v1load'); if(b) b.onclick=()=>loadV1(document.getElementById('v1input').value);
  const inp=document.getElementById('v1input'); if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')loadV1(inp.value);}); }

// ─── Camera scanner (jsQR) ──────────────────────────────────────────────────
let scanStream=null,scanRAF=null;
const scanOverlay=document.getElementById('scanOverlay');
const scanVideo=document.getElementById('scanVideo');
const scanStatusEl=document.getElementById('scanStatus');
const scanCanvas=document.createElement('canvas');
function openScanner(){
  if(!scanOverlay)return;
  scanOverlay.classList.add('open');
  scanStatusEl.textContent='Starting camera…';
  if(typeof jsQR==='undefined'){scanStatusEl.textContent='Scanner library missing — paste a code instead.';return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){scanStatusEl.textContent='No camera here (needs HTTPS) — paste a code instead.';return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
    .then(stream=>{scanStream=stream;scanVideo.srcObject=stream;return scanVideo.play();})
    .then(()=>{scanStatusEl.textContent='Point at a sub QR…';scanRAF=requestAnimationFrame(tickScan);})
    .catch(err=>{scanStatusEl.textContent='Camera error: '+err.message+' — paste a code instead.';});
}
function tickScan(){
  if(!scanOverlay.classList.contains('open'))return;
  if(scanVideo.readyState===scanVideo.HAVE_ENOUGH_DATA&&scanVideo.videoWidth){
    const w=scanVideo.videoWidth,h=scanVideo.videoHeight;
    scanCanvas.width=w;scanCanvas.height=h;
    const ctx=scanCanvas.getContext('2d',{willReadFrequently:true});
    ctx.drawImage(scanVideo,0,0,w,h);
    let res=null;try{const img=ctx.getImageData(0,0,w,h);res=jsQR(img.data,w,h,{inversionAttempts:'dontInvert'});}catch(e){}
    if(res&&res.data){
      const txt=res.data.trim(),i=txt.indexOf('V1*');
      if(i>=0){closeScanner();loadV1(txt.slice(i));return;}
      scanStatusEl.textContent='Not a sub QR — keep pointing…';
    }
  }
  scanRAF=requestAnimationFrame(tickScan);
}
function closeScanner(){
  if(!scanOverlay)return;
  scanOverlay.classList.remove('open');
  if(scanRAF){cancelAnimationFrame(scanRAF);scanRAF=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  scanVideo.srcObject=null;
}
{ const b=document.getElementById('scanBtn');if(b)b.onclick=openScanner;
  const c=document.getElementById('scanCancel');if(c)c.onclick=closeScanner;
  const pb=document.getElementById('scanPasteBtn');if(pb)pb.onclick=()=>{if(loadV1(document.getElementById('scanPaste').value))closeScanner();};
  const pi=document.getElementById('scanPaste');if(pi)pi.addEventListener('keydown',e=>{if(e.key==='Enter'&&loadV1(pi.value))closeScanner();}); }

function renderEmptyOrDemo(){
  const lbl=document.getElementById('v1sub'); if(lbl) lbl.textContent='Demo — tap 📷 Scan';
  render();
}
if(!loadV1FromHash()) renderEmptyOrDemo();
